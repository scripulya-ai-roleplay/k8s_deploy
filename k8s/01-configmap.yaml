# Non-secret configuration shared by all scripulya workloads.
# Both apps use pydantic-settings with extra="ignore", case_sensitive=False, so a
# single ConfigMap is safe: each app reads only the keys it knows and ignores the rest.
#
# NOTE: hostnames use in-cluster Service DNS (<svc>.<ns>.svc.cluster.local).
# The queue names and RABBIT_URL are a CONTRACT between the backend and the worker —
# keep them in sync with docker-compose.yml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scripulya-config
  namespace: scripulya
  labels:
    app.kubernetes.io/part-of: scripulya
data:
  # --- shared ---
  RABBIT_URL: amqp://guest:guest@rabbitmq.scripulya.svc.cluster.local:5672/
  # Redis is the heartbeat/liveness store between the backend and the worker
  # (token streaming will reuse it later). db 0.
  REDIS_URL: redis://redis.scripulya.svc.cluster.local:6379/0
  DEBUG: "false"

  # --- scripulya_ai (backend) ---
  HOST: 0.0.0.0
  PORT: "8000"
  DATABASE_URL: postgresql+asyncpg://user:password@postgres.scripulya.svc.cluster.local:5432/dbname
  JWT_ALGORITHM: HS256
  LLM_AGENT_REQUEST_QUEUE: llm.agent.request
  LLM_AGENT_RESULT_QUEUE: llm.agent.result
  LLM_AGENT_TIMEOUT: "60"

  # --- Object storage (MinIO) for media assets (backend) ---
  # MINIO_INTERNAL_ENDPOINT is the in-cluster Service DNS the backend uses for data ops.
  # MINIO_PUBLIC_ENDPOINT is the host embedded in URLs handed to clients — for local
  # kind that is the NodePort (localhost:30900; needs a kind extraPortMapping or
  # `make pf`); set real DNS in prod. A wrong value makes every image URL 404.
  MINIO_INTERNAL_ENDPOINT: minio.scripulya.svc.cluster.local:9000
  MINIO_PUBLIC_ENDPOINT: localhost:30900
  MINIO_SECURE: "false"
  MINIO_BUCKET_PUBLIC: scripulya-public
  MINIO_BUCKET_PRIVATE: scripulya-private
  MINIO_PRESIGN_EXPIRY_SECONDS: "900"
  MEDIA_MAX_UPLOAD_BYTES: "10485760"

  # --- scripulya_agent (worker) ---
  LLM_REQUEST_QUEUE: llm.agent.request
  LLM_RESULT_QUEUE: llm.agent.result
  ZAI_BASE_URL: https://api.z.ai/api/paas/v4
  DEEPSEEK_BASE_URL: https://api.deepseek.com
  LLM_TEMPERATURE: "0.7"
  LLM_MAX_TOKENS: "4096"