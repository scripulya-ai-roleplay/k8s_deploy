
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scripulya-ai
  namespace: scripulya
  labels:
    app.kubernetes.io/name: scripulya-ai
    app.kubernetes.io/part-of: scripulya
spec:
  ingressClassName: nginx
  rules:
    - host: scripulya.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scripulya-ai
                port:
                  number: 8000