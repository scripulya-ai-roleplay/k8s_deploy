# Redis — heartbeat/liveness store shared by the backend and the LLM worker.
# The worker refreshes a short-TTL "alive" key per in-flight generation; the
# backend's watchdog sweeps inflight requests and surfaces FAILED when a key
# expires (agent died/stalled). Token streaming will reuse this instance later.
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: scripulya
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: scripulya
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: scripulya
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: scripulya
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: scripulya
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
