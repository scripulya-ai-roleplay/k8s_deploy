# scripulya_agent — FastStream LLM worker. Consumes llm.agent.request, publishes
# llm.agent.result. It has NO HTTP port, so probes verify it is actually subscribed
# to the request queue via the RabbitMQ management HTTP API (stdlib urllib only —
# no curl, no image patch, no sidecar).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scripulya-agent
  namespace: scripulya
  labels:
    app.kubernetes.io/name: scripulya-agent
    app.kubernetes.io/part-of: scripulya
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scripulya-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scripulya-agent
        app.kubernetes.io/part-of: scripulya
    spec:
      # Don't start until the broker is reachable (the worker has no internal retry).
      initContainers:
        - name: wait-for-rabbitmq
          image: scripulya-agent:dev
          imagePullPolicy: Never
          command: ["python", "-c"]
          args:
            - |
              import socket, sys, time
              host, port = "rabbitmq", 5672
              for _ in range(90):
                  try:
                      with socket.create_connection((host, port), 3):
                          print(f"connected to {host}:{port}")
                          sys.exit(0)
                  except OSError:
                      time.sleep(2)
              sys.exit(1)
        - name: wait-for-redis
          image: scripulya-agent:dev
          imagePullPolicy: Never
          command: ["python", "-c"]
          args:
            - |
              import socket, sys, time
              host, port = "redis", 6379
              for _ in range(90):
                  try:
                      with socket.create_connection((host, port), 3):
                          print(f"connected to {host}:{port}")
                          sys.exit(0)
                  except OSError:
                      time.sleep(2)
              sys.exit(1)
      containers:
        - name: scripulya-agent
          image: scripulya-agent:dev
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: scripulya-config
            - secretRef:
                name: scripulya-secrets
          # Healthy == a consumer is bound to llm.agent.request (i.e. the worker
          # is up AND subscribed). GET the queue via the management API and assert
          # consumers >= 1. Uses only the python stdlib already in the image.
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import base64, json, sys, urllib.request
                  req = urllib.request.Request("http://rabbitmq:15672/api/queues/%2F/llm.agent.request")
                  req.add_header("Authorization", "Basic " + base64.b64encode(b"guest:guest").decode())
                  q = json.loads(urllib.request.urlopen(req, timeout=5).read())
                  sys.exit(0 if q.get("consumers", 0) >= 1 else 1)
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import base64, json, sys, urllib.request
                  req = urllib.request.Request("http://rabbitmq:15672/api/queues/%2F/llm.agent.request")
                  req.add_header("Authorization", "Basic " + base64.b64encode(b"guest:guest").decode())
                  q = json.loads(urllib.request.urlopen(req, timeout=5).read())
                  sys.exit(0 if q.get("consumers", 0) >= 1 else 1)
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5