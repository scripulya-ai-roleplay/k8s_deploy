# MinIO — S3-compatible object storage for media assets (images).
#
# The backend provisions two buckets at startup: scripulya-public (anonymous
# read -> stable URLs) and scripulya-private (presigned URLs only). The S3 API
# port is exposed as a NodePort (30900) so clients can fetch presigned/public
# image URLs directly from MinIO. The backend reaches MinIO over the in-cluster
# Service as minio.scripulya.svc.cluster.local:9000.
#
# Root credentials come from scripulya-secrets (see scripts/gen-secrets.sh). The
# backend reuses the same MINIO_ROOT_USER / MINIO_ROOT_PASSWORD as its S3 access
# key / secret (they flow in via envFrom on the scripulya-ai Deployment).
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: scripulya
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: scripulya
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: scripulya
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: scripulya
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: scripulya
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: scripulya-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scripulya-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          # kubelet makes these HTTP calls itself (no curl in the image).
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
