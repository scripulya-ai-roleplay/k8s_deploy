# EXAMPLE ONLY — do NOT fill real values into this file and commit it.
#
# The real Secret is generated at deploy time from your local .env by:
#     make gen-secrets        # scripts/gen-secrets.sh
# which runs:
#     kubectl create secret generic scripulya-secrets -n scripulya \
#       --from-env-file=.env  (filtered to secret keys)  | kubectl apply -f -
#
# This file exists purely as a reference for the key names the workloads expect.
apiVersion: v1
kind: Secret
metadata:
  name: scripulya-secrets
  namespace: scripulya
  labels:
    app.kubernetes.io/part-of: scripulya
type: Opaque
stringData:
  # scripulya_ai
  JWT_SECRET_KEY: "REPLACE: run `make gen-secrets` from your .env"

  # MinIO (object storage for media). Same values the minio StatefulSet boots
  # with; the backend reuses them as its S3 access key / secret. Defaults
  # minioadmin/minioadmin are fine for local dev only.
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin"

  # scripulya_agent providers (empty = provider disabled, agent still boots)
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
  ZAI_API_KEY: ""
  DEEPSEEK_API_KEY: ""