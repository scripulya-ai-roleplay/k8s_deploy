# scripulya_ai — FastAPI HTTP backend.
# Image `scripulya-ai:dev` is built from ../scripulya_ai and loaded into kind
# (see scripts/load-images-kind.sh). imagePullPolicy: Never => use the loaded image.
---
apiVersion: v1
kind: Service
metadata:
  name: scripulya-ai
  namespace: scripulya
  labels:
    app.kubernetes.io/name: scripulya-ai
    app.kubernetes.io/part-of: scripulya
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: scripulya-ai
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scripulya-ai
  namespace: scripulya
  labels:
    app.kubernetes.io/name: scripulya-ai
    app.kubernetes.io/part-of: scripulya
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scripulya-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scripulya-ai
        app.kubernetes.io/part-of: scripulya
    spec:
      # Wait for dependencies before starting the app (it has no internal retry).
      initContainers:
        - name: wait-for-postgres
          image: scripulya-ai:dev
          imagePullPolicy: Never
          command: ["python", "-c"]
          args:
            - |
              import socket, sys, time
              host, port = "postgres", 5432
              for _ in range(60):
                  try:
                      with socket.create_connection((host, port), 3):
                          print(f"connected to {host}:{port}")
                          sys.exit(0)
                  except OSError:
                      time.sleep(2)
              sys.exit(1)
        - name: wait-for-rabbitmq
          image: scripulya-ai:dev
          imagePullPolicy: Never
          command: ["python", "-c"]
          args:
            - |
              import socket, sys, time
              host, port = "rabbitmq", 5672
              for _ in range(60):
                  try:
                      with socket.create_connection((host, port), 3):
                          print(f"connected to {host}:{port}")
                          sys.exit(0)
                  except OSError:
                      time.sleep(2)
              sys.exit(1)
        - name: wait-for-minio
          image: scripulya-ai:dev
          imagePullPolicy: Never
          command: ["python", "-c"]
          args:
            - |
              import socket, sys, time
              host, port = "minio", 9000
              for _ in range(60):
                  try:
                      with socket.create_connection((host, port), 3):
                          print(f"connected to {host}:{port}")
                          sys.exit(0)
                  except OSError:
                      time.sleep(2)
              sys.exit(1)
      containers:
        - name: scripulya-ai
          image: scripulya-ai:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: scripulya-config
            - secretRef:
                name: scripulya-secrets
          # /health is a public endpoint (added in scripulya_ai) that pings
          # Postgres (SELECT 1) -> 200, or 503 if the DB is unreachable.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30