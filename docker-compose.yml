name: scripulya

services:
  scripulya-ai:
    build:
      context: ${APPS_DIR:-..}/scripulya_ai
      dockerfile: build/Dockerfile
    image: scripulya-ai:dev
    ports:
      - "${AI_PORT:-8000}:8000"
    environment:
      DEBUG: ${DEBUG:-false}
      HOST: 0.0.0.0
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/dbname
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      JWT_ALGORITHM: HS256
      JWT_PUBLIC_KEY: ""
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      LLM_AGENT_REQUEST_QUEUE: llm.agent.request
      LLM_AGENT_RESULT_QUEUE: llm.agent.result
      LLM_AGENT_TIMEOUT: "60"
      REDIS_URL: redis://redis:6379/0
      MINIO_INTERNAL_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-scripulya-public}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET_PRIVATE:-scripulya-private}
      MINIO_PRESIGN_EXPIRY_SECONDS: "900"
      MEDIA_MAX_UPLOAD_BYTES: "10485760"
    networks:
      - scripulya-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  scripulya-agent:
    build:
      context: ${APPS_DIR:-..}/scripulya_agent
      dockerfile: Dockerfile
    image: scripulya-agent:dev
    environment:
      DEBUG: ${DEBUG:-false}
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      LLM_REQUEST_QUEUE: llm.agent.request
      LLM_RESULT_QUEUE: llm.agent.result
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
    networks:
      - scripulya-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dbname
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${APPS_DIR:-..}/scripulya_ai/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - scripulya-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBIT_MGMT_PORT:-15673}:15672"   # management UI (guest/guest)
    networks:
      - scripulya-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - scripulya-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # S3 API (presigned + public URLs hit this)
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # web console
    volumes:
      - minio_data:/data
    networks:
      - scripulya-net
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          mc alias set local http://localhost:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1 && mc ready local
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio-init:
    image: scripulya-ai:dev
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/dbname
      MINIO_INTERNAL_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-scripulya-public}
      MINIO_SECURE: "false"
      IMAGE_API_KEY: ${IMAGE_API_KEY:-${GEMINI_API_KEY:-}}
      IMAGE_API_MODEL: ${IMAGE_API_MODEL:-imagen-4.0-generate-001}
      FORCE_REGENERATE_MEDIA: ${FORCE_REGENERATE_MEDIA:-0}
      MEDIA_BACKUP_DIR: ${MEDIA_BACKUP_DIR:-/media-backup}
    volumes:
      - ${APPS_DIR:-..}/scripulya_ai/scripts/seed_minio_media.py:/app/scripts/seed_minio_media.py:ro
      - ./media-backup:/media-backup
    command: ["python", "/app/scripts/seed_minio_media.py"]
    restart: "no"
    networks:
      - scripulya-net

  mock-google-api:
    profiles: ["mock-google"]
    build:
      context: ${APPS_DIR:-..}/scripulya_ai
      dockerfile: google_api_mock/Dockerfile
    image: scripulya-mock-google-api:dev
    networks:
      scripulya-net:
        aliases:
          - generativelanguage.googleapis.com

networks:
  scripulya-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data: